services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - APP_NAME=${APP_NAME:-高纳AI}
      - COMPANY_NAME=${COMPANY_NAME:-高纳科技}
      - THEME=${THEME:-light}
      - DATABASE_URL=sqlite:///./data/hetianxia.db
      - UPLOAD_DIR=./data/uploads
      - THUMBNAIL_DIR=./data/thumbnails
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_NAME=${APP_NAME:-高纳AI}
        - VITE_COMPANY_NAME=${COMPANY_NAME:-高纳科技}
        - VITE_THEME=${THEME:-light}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
