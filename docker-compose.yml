version: "3.7"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - HTX_PYTHON_BASE_IMAGE=${HTX_PYTHON_BASE_IMAGE}
    ports:
      - "${HTX_HOST_BIND}:${HTX_BACKEND_PORT}:8000"
    volumes:
      - ./data:/app/data
      - ./backend/models:/app/models:ro
    env_file:
      - .env
    environment:
      - HTX_DATABASE_URL=sqlite:///./data/hetianxia.db
      - HTX_UPLOAD_DIR=./data/uploads
      - HTX_THUMBNAIL_DIR=./data/thumbnails
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - HTX_NODE_BASE_IMAGE=${HTX_NODE_BASE_IMAGE}
        - HTX_NGINX_BASE_IMAGE=${HTX_NGINX_BASE_IMAGE}
        - HTX_APP_NAME=${HTX_APP_NAME}
        - HTX_COMPANY_NAME=${HTX_COMPANY_NAME}
        - HTX_PLATFORM_NAME=${HTX_PLATFORM_NAME}
        - HTX_THEME=${HTX_THEME}
        - HTX_LAYOUT=${HTX_LAYOUT}
    env_file:
      - .env
    ports:
      - "${HTX_HOST_BIND}:${HTX_FRONTEND_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped
